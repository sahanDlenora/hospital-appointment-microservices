<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Patients - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="navbar"></div>

            <div class="content-area">
                <main class="container p-0">
                    <div class="page-header">
                        <div>
                            <h2>Patient Directory</h2>
                            <p class="text-muted mt-1">Manage active patient accounts and records.</p>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" class="form-control" placeholder="Search ID, Name, Email..."
                                style="width: 280px;">
                            <button class="btn btn-primary">
                                <i>+</i> New Patient
                            </button>
                        </div>
                    </div>

                    <div class="table-container mt-3">
                        <table>
                            <thead>
                                <tr>
                                    <th>Patient ID</th>
                                    <th>Patient Details</th>
                                    <th>Contact Info</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><span class="badge badge-neutral">PT-1001</span></td>
                                    <td>
                                        <div class="flex items-center gap-3">
                                            <div class="avatar" style="width: 36px; height: 36px; font-size: 0.9rem;">JD
                                            </div>
                                            <strong>John Doe</strong>
                                        </div>
                                    </td>
                                    <td>
                                        <span style="display: block;">john.doe@example.com</span>
                                        <span class="text-muted" style="font-size: 0.85rem;">(555) 123-4567</span>
                                    </td>
                                    <td style="text-align: right;">
                                        <div class="flex gap-2" style="justify-content: flex-end;">
                                            <button class="btn btn-outline"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Edit</button>
                                            <button class="btn btn-danger"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td><span class="badge badge-neutral">PT-1002</span></td>
                                    <td>
                                        <div class="flex items-center gap-3">
                                            <div class="avatar"
                                                style="width: 36px; height: 36px; font-size: 0.9rem; background: var(--success); color: white; border: none;">
                                                JS</div>
                                            <strong>Jane Smith</strong>
                                        </div>
                                    </td>
                                    <td>
                                        <span style="display: block;">jane.smith@example.com</span>
                                        <span class="text-muted" style="font-size: 0.85rem;">(555) 987-6543</span>
                                    </td>
                                    <td style="text-align: right;">
                                        <div class="flex gap-2" style="justify-content: flex-end;">
                                            <button class="btn btn-outline"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Edit</button>
                                            <button class="btn btn-danger"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td><span class="badge badge-neutral">PT-1003</span></td>
                                    <td>
                                        <div class="flex items-center gap-3">
                                            <div class="avatar"
                                                style="width: 36px; height: 36px; font-size: 0.9rem; background: var(--warning); color: white; border: none;">
                                                RJ</div>
                                            <strong>Robert Johnson</strong>
                                        </div>
                                    </td>
                                    <td>
                                        <span style="display: block;">robert.j@example.com</span>
                                        <span class="text-muted" style="font-size: 0.85rem;">(555) 456-7890</span>
                                    </td>
                                    <td style="text-align: right;">
                                        <div class="flex gap-2" style="justify-content: flex-end;">
                                            <button class="btn btn-outline"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Edit</button>
                                            <button class="btn btn-danger"
                                                style="padding: 0.35rem 0.75rem; font-size: 0.85rem;">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
            <div id="footer"></div>
        </main>
    </div>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
