<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">
        <div id="sidebar"></div>

        <main class="main-content">
            <div id="navbar"></div>

            <div class="content-area">
                <div class="container p-0">

                    <div class="page-header flex justify-between items-center">
                        <div>
                            <h2>Doctor Directory</h2>
                            <p class="text-muted mt-1">Manage specialist profiles and assignments.</p>
                        </div>
                        <button class="btn btn-primary" id="addDoctorBtn">
                            <i>+</i> Add New Doctor
                        </button>
                    </div>

                    <!-- Add / Edit Doctor Card -->
                    <div id="add-doctor-card" class="card mb-3"
                        style="display: none; border-top: 4px solid var(--primary);">
                        <div class="flex justify-between items-center mb-3">
                            <h3 id="formTitle" style="margin: 0;">Add New Doctor</h3>
                            <button class="btn btn-outline"
                                style="padding: 0.2rem 0.5rem; border: none;"
                                id="closeAddDoctor">✕</button>
                        </div>

                        <input type="hidden" id="editDoctorId" />

                        <form id="addDoctorForm">
                            <div class="flex gap-3 mb-3" style="flex-wrap: wrap;">
                                <div class="form-group" style="flex: 1; min-width: 200px;">
                                    <label for="doctor-name">Full Name</label>
                                    <input type="text" id="doctor-name" class="form-control"
                                        placeholder="Dr. Firstname Lastname" />
                                </div>
                                <div class="form-group" style="flex: 1; min-width: 200px;">
                                    <label for="specialization">Specialization</label>
                                    <input type="text" id="specialization" class="form-control"
                                        placeholder="e.g. Cardiologist" />
                                </div>
                                <div class="form-group" style="flex: 1; min-width: 200px;">
                                    <label for="department">Department ID</label>
                                    <input type="number" id="department" class="form-control"
                                        placeholder="e.g. 1" />
                                </div>
                            </div>
                            <div class="flex gap-3 mb-3" style="flex-wrap: wrap;">
                                <div class="form-group" style="flex: 1; min-width: 200px;">
                                    <label for="doc-email">Email</label>
                                    <input type="email" id="doc-email" class="form-control"
                                        placeholder="doctor@clinic.com" />
                                </div>
                                <div class="form-group" style="flex: 1; min-width: 200px;">
                                    <label for="doc-phone">Phone</label>
                                    <input type="text" id="doc-phone" class="form-control"
                                        placeholder="+94 77 123 4567" />
                                </div>
                                <div style="flex: 1; min-width: 200px;"></div>
                            </div>

                            <div id="formError"
                                style="display: none; color: var(--danger); font-size: 0.875rem; margin-bottom: 0.75rem;">
                            </div>

                            <div class="text-right mt-3">
                                <button type="submit" class="btn btn-primary">
                                    Save Doctor Profile
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Doctor Table -->
                    <div class="table-container mt-3">
                        <table>
                            <thead>
                                <tr>
                                    <th>Doctor Profile</th>
                                    <th>Specialization</th>
                                    <th>Department</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctorTableBody">
                                <tr>
                                    <td colspan="4"
                                        style="text-align: center; padding: 2rem; color: var(--text-muted);">
                                        Loading doctors…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

            <div id="footer"></div>
        </main>
    </div>

    <!-- Delete Confirmation Overlay -->
    <div id="deleteOverlay"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
               z-index: 1000; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 420px; width: 90%; margin: 0 auto;">
            <h3 style="margin-bottom: 0.5rem;">Delete Doctor</h3>
            <p class="text-muted" style="margin-bottom: 1.5rem;">
                Are you sure you want to delete this doctor? This cannot be undone.
            </p>
            <div class="flex gap-2" style="justify-content: flex-end;">
                <button class="btn btn-outline" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"
        style="display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
               padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.875rem;
               color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.2); min-width: 220px;">
    </div>

    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/manage-doctors.js"></script>
</body>

</html>
