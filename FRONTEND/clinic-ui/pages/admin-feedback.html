<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Feedback - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">

        <div id="sidebar"></div>

        <main class="main-content">
            <div id="navbar"></div>

            <div class="content-area">
                <main class="container p-0">

                    <div class="page-header">
                        <div>
                            <h2>Recent Feedback</h2>
                            <p class="text-muted mt-1">Review patient experiences and clinic ratings.</p>
                        </div>
                        <div class="flex gap-2">
                            <select id="ratingFilter" class="form-control" style="width:auto;min-width:150px;">
                                <option value="">All Ratings</option>
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars & Up</option>
                                <option value="3">3 Stars & Up</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container mt-3">
                        <table>
                            <thead>
                                <tr>
                                    <th>Patient</th>
                                    <th>Doctor</th>
                                    <th>Rating</th>
                                    <th>Comment</th>
                                    <th style="text-align:right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="feedbackTableBody">
                                <tr>
                                    <td colspan="5" class="text-muted" style="text-align:center;padding:2rem">
                                        Loading feedbacks...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </main>
            </div>

            <div id="footer"></div>
        </main>
    </div>

    <script>
        let allFeedbacks = [];

        document.addEventListener("DOMContentLoaded", function () {
            loadFeedbacks();

            document.getElementById("ratingFilter").addEventListener("change", function () {
                filterFeedbacks(this.value);
            });
        });

        async function loadFeedbacks() {
            try {
                const token = localStorage.getItem("token");

                const response = await fetch("http://localhost:8083/feedbacks", {
                    method: "GET",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    alert("Failed to load feedbacks.");
                    return;
                }

                allFeedbacks = await response.json();
                renderTable(allFeedbacks);

            } catch (error) {
                console.error("Error loading feedbacks:", error);
                alert("Server error while loading feedbacks.");
            }
        }

        function filterFeedbacks(minRating) {
            if (!minRating) {
                renderTable(allFeedbacks);
            } else {
                const filtered = allFeedbacks.filter(fb => fb.rating >= parseInt(minRating));
                renderTable(filtered);
            }
        }

        async function deleteFeedback(id) {
            if (!confirm("Are you sure you want to delete this feedback?")) return;

            try {
                const token = localStorage.getItem("token");

                const response = await fetch("http://localhost:8083/feedbacks/" + id, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                if (response.ok) {
                    alert("Feedback deleted.");
                    loadFeedbacks(); // refresh table
                } else {
                    alert("Failed to delete feedback.");
                }

            } catch (error) {
                console.error(error);
                alert("Server error.");
            }
        }

        function renderTable(feedbacks) {
            const tbody = document.getElementById("feedbackTableBody");
            tbody.innerHTML = "";

            if (feedbacks.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-muted" style="text-align:center;padding:2rem">
                            No feedbacks found.
                        </td>
                    </tr>`;
                return;
            }

            feedbacks.forEach(fb => {
                const filledStars = "★".repeat(fb.rating);
                const emptyStars = "★".repeat(5 - fb.rating);

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td><strong>${fb.patient ? fb.patient.name : "Unknown"}</strong></td>
                    <td><span class="badge badge-neutral">${fb.doctor ? "Dr. " + fb.doctor.name : "Unknown"}</span></td>
                    <td>
                        <span class="text-warning" style="font-size:1.1rem;letter-spacing:2px;">${filledStars}</span>
                        <span style="color:#e2e8f0;font-size:1.1rem;letter-spacing:2px;">${emptyStars}</span>
                    </td>
                    <td class="text-muted">${fb.comment || "—"}</td>
                    <td style="text-align:right;">
                        <button 
                            onclick="deleteFeedback(${fb.feedbackId})" 
                            class="btn btn-danger" 
                            style="padding:0.3rem 0.75rem;font-size:0.8rem;">
                            Delete
                        </button>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }
    </script>

    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
