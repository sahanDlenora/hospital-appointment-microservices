<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-card" style="max-width: 500px;">
            <div class="text-center mb-3">
                <div class="avatar mx-auto mb-2"
                    style="width: 60px; height: 60px; background: var(--primary-light); font-size: 1.5rem;">C</div>
                <h2 class="auth-title">Create an Account</h2>
                <p class="text-muted">Join ClinicCare as a new patient</p>
            </div>

            <form id="registerForm">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="text" id="age" class="form-control" placeholder="xx" required>
                </div>


                <div class="form-row">

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="(555) 123-4567" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="address" id="address" class="form-control" placeholder="No XX.." required>
                    </div>
                </div>



                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 0.75rem; margin-top: 0.5rem;">Create Account</button>

                <div class="auth-links mt-3 text-center">
                    <p class="text-muted">Already have an account? <a href="login.html" class="text-primary font-500"
                            style="text-decoration: none;">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
document.getElementById("registerForm").addEventListener("submit", async function(event) {
    event.preventDefault(); // stop normal form submission

    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("http://localhost:8083/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                name: name,
                age: parseInt(age),
                phone: phone,
                address: address,
                role: "PATIENT" 
            })
        });

        if (!response.ok) {
            alert("Registration failed!");
            return;
        }

        alert("Registration successful! Please login.");
        window.location.href = "login.html";

    } catch (error) {
        console.error("Error:", error);
        alert("Server error!");
    }
});
</script>

</body>

</html>
