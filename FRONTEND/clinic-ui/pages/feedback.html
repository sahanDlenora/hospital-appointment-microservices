<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give Feedback - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .star-rating {
            direction: rtl;
            display: inline-flex;
            font-size: 2.5rem;
            gap: 0.25rem;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            color: var(--border-color);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .star-rating label:hover,
        .star-rating label:hover~label,
        .star-rating input:checked~label {
            color: #FBBF24;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <div id="sidebar"></div>
        <div class="main-content">
            <div id="navbar"></div>

            <div class="content-area">
                <main class="container p-0">
                    <div class="page-header">
                        <div>
                            <h2>Give Feedback</h2>
                            <p class="text-muted mt-1">We value your review to help us improve our services.</p>
                        </div>
                    </div>

                    <div class="card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem;">
                        <form action="patient-dashboard.html">
                            <div class="form-group mb-3 pb-3" style="border-bottom: 1px solid var(--border-color);">
                                <label for="doctor">Select Past Visit</label>
                                <select id="doctor" class="form-control" required style="padding: 1rem;">
                                    <option value="" disabled selected>— Choose the doctor you visited —</option>
                                    <option value="1">Dr. Michael Chen (Visited Mar 15, 2026)</option>
                                    <option value="2">Dr. Sarah Jenkins (Visited Feb 10, 2026)</option>
                                </select>
                            </div>

                            <div class="form-group mb-3 text-center">
                                <label style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 1rem;">Rate
                                    Your Overall Experience</label>
                                <div class="star-rating">
                                    <input type="radio" id="star5" name="rating" value="5" /><label for="star5"
                                        title="5 stars">★</label>
                                    <input type="radio" id="star4" name="rating" value="4" /><label for="star4"
                                        title="4 stars">★</label>
                                    <input type="radio" id="star3" name="rating" value="3" /><label for="star3"
                                        title="3 stars">★</label>
                                    <input type="radio" id="star2" name="rating" value="2" /><label for="star2"
                                        title="2 stars">★</label>
                                    <input type="radio" id="star1" name="rating" value="1" /><label for="star1"
                                        title="1 star">★</label>
                                </div>
                            </div>

                            <div class="form-group mb-4">
                                <label for="comment">Detailed Review <span
                                        class="text-muted font-400">(Optional)</span></label>
                                <textarea id="comment" class="form-control" rows="5" style="padding: 1rem;"
                                    placeholder="Tell us what you liked and what we can improve..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary"
                                style="width: 100%; font-size: 1.1rem; padding: 1rem; justify-content: center;">
                                Submit Feedback
                            </button>
                        </form>
                    </div>
                </main>
            </div>
            <div id="footer"></div>
        </div>
    </div>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
