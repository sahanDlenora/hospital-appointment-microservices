<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Departments - ClinicCare</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="navbar"></div>

            <div class="content-area">
                <main class="container p-0">
                    <div class="page-header">
                        <div>
                            <h2>Department List</h2>
                            <p class="text-muted mt-1">Configure clinical sectors.</p>
                        </div>
                        <button class="btn btn-primary"
                            onclick="document.getElementById('add-dept-card').style.display='block'">
                            <i>+</i> Add Department
                        </button>
                    </div>

                    <div id="add-dept-card" class="card mb-3"
                        style="display:none; border-top: 4px solid var(--primary);">
                        <div class="flex justify-between items-center mb-3">
                            <h3 style="margin:0;">Add New Department</h3>
                            <button class="btn btn-outline" style="padding:0.2rem 0.5rem;border:none;"
                                onclick="document.getElementById('add-dept-card').style.display='none'">✕</button>
                        </div>
                        <div class="flex gap-3 mb-3 items-end" style="flex-wrap:wrap;">
                            <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                                <label>Department Code</label>
                                <input type="text" id="dept-code" class="form-control" placeholder="e.g. CARD-01"
                                    required>
                            </div>
                            <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                                <label>Department Name</label>
                                <input type="text" id="dept-name" class="form-control" placeholder="e.g. Cardiology"
                                    required>
                            </div>
                            <div class="form-group" style="flex:2;min-width:300px;margin-bottom:0;">
                                <label>Description</label>
                                <input type="text" id="dept-description" class="form-control"
                                    placeholder="e.g. Handles heart related treatments">
                            </div>
                            <div>
                                <button type="button" class="btn btn-primary" style="padding:0.75rem 1.5rem;"
                                    onclick="saveDepartment()">Save</button>
                            </div>
                        </div>
                    </div>

                    <div id="edit-dept-card" class="card mb-3"
                        style="display:none; border-top: 4px solid var(--primary);">
                        <div class="flex justify-between items-center mb-3">
                            <h3 style="margin:0;">Edit Department</h3>
                            <button class="btn btn-outline" style="padding:0.2rem 0.5rem;border:none;"
                                onclick="document.getElementById('edit-dept-card').style.display='none'">✕</button>
                        </div>
                        <div class="flex gap-3 mb-3 items-end" style="flex-wrap:wrap;">
                            <input type="hidden" id="edit-dept-id">
                            <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                                <label>Department Code</label>
                                <input type="text" id="edit-dept-code" class="form-control" placeholder="e.g. CARD-01"
                                    required>
                            </div>
                            <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                                <label>Department Name</label>
                                <input type="text" id="edit-dept-name" class="form-control"
                                    placeholder="e.g. Cardiology" required>
                            </div>
                            <div class="form-group" style="flex:2;min-width:300px;margin-bottom:0;">
                                <label>Description</label>
                                <input type="text" id="edit-dept-description" class="form-control"
                                    placeholder="e.g. Handles heart related treatments">
                            </div>
                            <div>
                                <button type="button" class="btn btn-primary" style="padding:0.75rem 1.5rem;"
                                    onclick="updateDepartment()">Update</button>
                            </div>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th style="text-align:right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="deptTableBody">
                                <tr>
                                    <td colspan="5" class="text-muted" style="text-align:center;padding:2rem">
                                        Loading departments...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
            <div id="footer"></div>
        </main>
    </div>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        loadDepartments();
    });

    async function loadDepartments() {
        try {
            const token = localStorage.getItem("token");

            const response = await fetch("http://localhost:8083/api/departments", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                alert("Failed to load departments.");
                return;
            }

            const departments = await response.json();
            renderTable(departments);

        } catch (error) {
            console.error("Error:", error);
            alert("Server error while loading departments.");
        }
    }

    function renderTable(departments) {
        const tbody = document.getElementById("deptTableBody");
        tbody.innerHTML = "";

        if (departments.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="text-muted" style="text-align:center;padding:2rem">
                        No departments found.
                    </td>
                </tr>`;
            return;
        }

        departments.forEach(dept => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><span class="badge badge-neutral">${dept.id}</span></td>
                <td>${dept.departmentCode || "—"}</td>
                <td><strong class="text-main">${dept.departmentName}</strong></td>
                <td class="text-muted">${dept.departmentDescription || "—"}</td>
                <td style="text-align:right;">
                    <div class="flex gap-2" style="justify-content:flex-end;">
                        <button class="btn btn-outline"
                            style="padding:0.35rem 0.75rem;font-size:0.85rem;"
                            onclick="openEditCard(${dept.id}, '${dept.departmentCode || ""}', '${dept.departmentName}', '${dept.departmentDescription || ""}')">
                            Edit
                        </button>
                        <button class="btn btn-danger"
                            style="padding:0.35rem 0.75rem;font-size:0.85rem;"
                            onclick="deleteDepartment(${dept.id})">
                            Delete
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function saveDepartment() {
        const code = document.getElementById("dept-code").value.trim();
        const name = document.getElementById("dept-name").value.trim();
        const description = document.getElementById("dept-description").value.trim();

        if (!code || !name) {
            alert("Code and Name are required.");
            return;
        }

        try {
            const token = localStorage.getItem("token");
            const role = localStorage.getItem("role");

            const response = await fetch("http://localhost:8083/api/departments", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token,
                    "role": role
                },
                body: JSON.stringify({
                    departmentCode: code,
                    departmentName: name,
                    departmentDescription: description
                })
            });

            if (response.ok) {
                alert("Department added successfully.");
                document.getElementById("dept-code").value = "";
                document.getElementById("dept-name").value = "";
                document.getElementById("dept-description").value = "";
                document.getElementById("add-dept-card").style.display = "none";
                loadDepartments();
            } else {
                const err = await response.text();
                console.error(err);
                alert("Failed to add department. Check console.");
            }

        } catch (error) {
            console.error(error);
            alert("Server error.");
        }
    }

    function openEditCard(id, code, name, description) {
        document.getElementById("edit-dept-id").value = id;
        document.getElementById("edit-dept-code").value = code;
        document.getElementById("edit-dept-name").value = name;
        document.getElementById("edit-dept-description").value = description;
        document.getElementById("edit-dept-card").style.display = "block";
        document.getElementById("add-dept-card").style.display = "none";
        // scroll to edit card
        document.getElementById("edit-dept-card").scrollIntoView({ behavior: "smooth" });
    }

    async function updateDepartment() {
        const id = document.getElementById("edit-dept-id").value;
        const code = document.getElementById("edit-dept-code").value.trim();
        const name = document.getElementById("edit-dept-name").value.trim();
        const description = document.getElementById("edit-dept-description").value.trim();

        if (!code || !name) {
            alert("Code and Name are required.");
            return;
        }

        try {
            const token = localStorage.getItem("token");
            const role = localStorage.getItem("role");

            const response = await fetch("http://localhost:8083/api/departments/" + id, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token,
                    "role": role
                },
                body: JSON.stringify({
                    departmentCode: code,
                    departmentName: name,
                    departmentDescription: description
                })
            });

            if (response.ok) {
                alert("Department updated successfully.");
                document.getElementById("edit-dept-card").style.display = "none";
                loadDepartments();
            } else {
                alert("Failed to update department.");
            }

        } catch (error) {
            console.error(error);
            alert("Server error.");
        }
    }

    async function deleteDepartment(id) {
        if (!confirm("Are you sure you want to delete this department?")) return;

        try {
            const token = localStorage.getItem("token");
            const role = localStorage.getItem("role");

            const response = await fetch("http://localhost:8083/api/departments/" + id, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token,
                    "role": role
                }
            });

            if (response.ok) {
                alert("Department deleted.");
                loadDepartments();
            } else {
                alert("Failed to delete department.");
            }

        } catch (error) {
            console.error(error);
            alert("Server error.");
        }
    }
</script>

</body>

</html>
